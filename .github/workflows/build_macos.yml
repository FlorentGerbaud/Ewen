name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller matplotlib==3.7.5 scikit-learn numpy pygame vispy PyQt6 scipy

      - name: Build ProposalColorRange
        run: pyinstaller --onefile --windowed --name "ProposalColorRange" src/proposalColorRange.py

      - name: Build BuildJSON
        run: pyinstaller --onefile --windowed --name "BuildJSON" src/buildJSON.py

      - name: Build PSAC
        run: pyinstaller --onefile --windowed --name "PSAC" PSAC.py

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Apps-macOS
          path: dist/
          retention-days: 7
